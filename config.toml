
# ══════════════════════════════════════════════
# Main Configuration Settings
# ══════════════════════════════════════════════
# theme = "horizon-dark"
# theme = "bogster"
theme = "rose_pine"
# theme = "ashen"
# theme = "tokyonight"
# theme = "ayu-dark"
# theme = "catppuccin-mocha"
# theme = "dark-synthwave"
# white one
# theme = "earl-grey"

[editor]
cursorline = true
auto-save = true
bufferline = "always"
color-modes = true
completion-trigger-len = 1
line-number = "relative"
scrolloff = 8
shell = ["bash", "-c"]
idle-timeout = 50
true-color = true
# rulers = [80, 120]
rulers = []
text-width = 120
end-of-line-diagnostics = "hint"

[editor.inline-diagnostics]
cursor-line = "warning"
other-lines = "error"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
character = "│"
skip-levels = 1

[editor.file-picker]
hidden = false

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.statusline]
left = ["mode", "spinner", "file-name", "read-only-indicator", "file-modification-indicator"]
center = ["diagnostics"]
right = ["selections", "register", "position", "file-encoding", "file-line-ending", "file-type", "version-control"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.whitespace.render]
tab = "all"
nbsp = "all"

[editor.soft-wrap]
enable = true
wrap-at-text-width = true

# ──────────────────────────────────────────────
# NORMAL MODE
# ──────────────────────────────────────────────

[keys.normal]
# Quick iteration on config changes
C-o = ":config-open"
C-r = ":config-reload"
"C-tab" = "goto_next_function"
"S-tab" = "goto_prev_function"
K = "hover"

# Better buffer navigation
H = ":buffer-previous"
L = ":buffer-next"

# Navigate splits
C-h = "jump_view_left"
C-j = "jump_view_down"
C-k = "jump_view_up"
C-l = "jump_view_right"

# Half-page scroll centered (like vim's zz after scroll)
"C-d" = ["half_page_down", "goto_window_center"]
"C-u" = ["half_page_up", "goto_window_center"]

# Vim muscle memory: paragraph motions
"{" = ["goto_prev_paragraph", "collapse_selection"]
"}" = ["goto_next_paragraph", "collapse_selection"]

# Vim line navigation
0 = "goto_line_start"
"$" = "goto_line_end"
"^" = "goto_first_nonwhitespace"
G = "goto_file_end"

# Visual line mode
V = ["select_mode", "extend_to_line_bounds"]

# C/D — Vim-style change/delete to end of line
C = ["extend_to_line_end", "yank_main_selection_to_clipboard", "delete_selection", "insert_mode"]
D = ["extend_to_line_end", "yank_main_selection_to_clipboard", "delete_selection"]

# Surround
S = "surround_add"

# Clipboard-first (LazyVim default behavior)
x = "delete_selection"
p = ["paste_clipboard_after", "collapse_selection"]
P = ["paste_clipboard_before", "collapse_selection"]
Y = ["extend_to_line_end", "yank_main_selection_to_clipboard", "collapse_selection"]

# Word motions matching Vim behavior
w = ["move_next_word_start", "move_char_right", "collapse_selection"]
W = ["move_next_long_word_start", "move_char_right", "collapse_selection"]
e = ["move_next_word_end", "collapse_selection"]
E = ["move_next_long_word_end", "collapse_selection"]
b = ["move_prev_word_start", "collapse_selection"]
B = ["move_prev_long_word_start", "collapse_selection"]

# Collapse selection on insert/append (critical for Vim feel)
i = ["insert_mode", "collapse_selection"]
a = ["append_mode", "collapse_selection"]

# Clean undo
u = ["undo", "collapse_selection"]

# Escape: collapse everything
esc = ["collapse_selection", "keep_primary_selection"]

# Search word under cursor (* and # from Vim)
"*" = ["move_char_right", "move_prev_word_start", "move_next_word_end", "search_selection", "search_next"]
"#" = ["move_char_right", "move_prev_word_start", "move_next_word_end", "search_selection", "search_prev"]

# Soft-wrap aware j/k
j = "move_line_down"
k = "move_line_up"

# Word hopping (Helix goto_word is like EasyMotion/flash.nvim — LazyVim uses 's')
ret = "goto_word"

# ─ ] and [ bracket motions ─
[keys.normal."]"]
"]" = "goto_next_paragraph"
d = "goto_next_diag"
g = "goto_next_change"
f = "goto_next_function"
t = "goto_next_class"

[keys.normal."["]
"[" = "goto_prev_paragraph"
d = "goto_prev_diag"
g = "goto_prev_change"
f = "goto_prev_function"
t = "goto_prev_class"

# ─ d[motion] — delete with yank to clipboard ──
[keys.normal.d]
d = ["extend_to_line_bounds", "yank_main_selection_to_clipboard", "delete_selection"]
t = "extend_till_char"
s = "surround_delete"
i = "select_textobject_inner"
a = "select_textobject_around"
j = ["select_mode", "extend_to_line_bounds", "extend_line_below", "yank_main_selection_to_clipboard", "delete_selection", "normal_mode"]
down = ["select_mode", "extend_to_line_bounds", "extend_line_below", "yank_main_selection_to_clipboard", "delete_selection", "normal_mode"]
k = ["select_mode", "extend_to_line_bounds", "extend_line_above", "yank_main_selection_to_clipboard", "delete_selection", "normal_mode"]
up = ["select_mode", "extend_to_line_bounds", "extend_line_above", "yank_main_selection_to_clipboard", "delete_selection", "normal_mode"]
G = ["select_mode", "extend_to_line_bounds", "goto_last_line", "extend_to_line_bounds", "yank_main_selection_to_clipboard", "delete_selection", "normal_mode"]
w = ["move_next_word_start", "yank_main_selection_to_clipboard", "delete_selection"]
W = ["move_next_long_word_start", "yank_main_selection_to_clipboard", "delete_selection"]
g = { g = ["select_mode", "extend_to_line_bounds", "goto_file_start", "extend_to_line_bounds", "yank_main_selection_to_clipboard", "delete_selection", "normal_mode"] }

# ─ y[motion] — yank to clipboard ─
[keys.normal.y]
y = ["extend_to_line_bounds", "yank_main_selection_to_clipboard", "normal_mode", "collapse_selection"]
j = ["select_mode", "extend_to_line_bounds", "extend_line_below", "yank_main_selection_to_clipboard", "collapse_selection", "normal_mode"]
down = ["select_mode", "extend_to_line_bounds", "extend_line_below", "yank_main_selection_to_clipboard", "collapse_selection", "normal_mode"]
k = ["select_mode", "extend_to_line_bounds", "extend_line_above", "yank_main_selection_to_clipboard", "collapse_selection", "normal_mode"]
up = ["select_mode", "extend_to_line_bounds", "extend_line_above", "yank_main_selection_to_clipboard", "collapse_selection", "normal_mode"]
G = ["select_mode", "extend_to_line_bounds", "goto_last_line", "extend_to_line_bounds", "yank_main_selection_to_clipboard", "collapse_selection", "normal_mode"]
w = ["move_next_word_start", "yank_main_selection_to_clipboard", "collapse_selection", "normal_mode"]
W = ["move_next_long_word_start", "yank_main_selection_to_clipboard", "collapse_selection", "normal_mode"]
g = { g = ["select_mode", "extend_to_line_bounds", "goto_file_start", "extend_to_line_bounds", "yank_main_selection_to_clipboard", "collapse_selection", "normal_mode"] }

# ─ <Space> leader key
[keys.normal.space]
w = ":write-all"
q = ":quit-all"
x = ":buffer-close"
X = ":buffer-close!"
e = "file_explorer"

# Toggle inlay hints
u = ":toggle lsp.display-inlay-hints"

# File pickers
f = "file_picker"
F = "file_picker_in_current_buffer_directory"
"/" = "global_search"

# Buffer navigation (LazyVim: <leader>bb, <leader>bp, <leader>bn)
b = { b = "buffer_picker", n = ":buffer-next", p = ":buffer-previous", d = ":buffer-close" }

# LSP actions (LazyVim: <leader>ca, <leader>cr, etc.)
c = { a = "code_action", r = "rename_symbol", f = ":format", d = "diagnostics_picker", w = "workspace_diagnostics_picker" }

# Goto/navigation (LazyVim: gd, gr, gi, etc. — these supplement g-prefixed defaults)
g = { d = "goto_definition", r = "goto_reference", i = "goto_implementation", t = "goto_type_definition", s = "symbol_picker", S = "workspace_symbol_picker" }

# Diagnostics shortcut
d = "diagnostics_picker"

# Debug/print helper
l = ":pipe-to helix-debug-print"

# Window management (LazyVim: <leader>- and <leader>|)
"-" = "hsplit"
"\\" = "vsplit"

# Theme picker
t = ":theme "

# Command palette equivalent
":" = "command_palette"

# Search/replace
s = "select_regex"
S = "split_selection"

# gcc — toggle comment (Vim-style)
[keys.normal.g]
c = { c = "toggle_comments" }
a = "code_action"

# gc in visual/select mode — comment selection
[keys.select.g]
c = "toggle_comments"

# ──────────────────────────────────────────────
# INSERT MODE
# ──────────────────────────────────────────────

[keys.insert]
# Emacs-style line editing (muscle memory from terminal/LazyVim)
A-b = ["move_prev_word_start", "collapse_selection"]
A-f = ["move_next_word_end", "move_char_right"]
C-a = "goto_first_nonwhitespace"
C-b = "move_char_left"
C-d = "delete_char_forward"
C-e = "goto_line_end_newline"
C-f = "move_char_right"
C-n = "move_line_down"
C-p = "move_line_up"

# Clean escape
esc = ["collapse_selection", "normal_mode"]

# ──────────────────────────────────────────────
# SELECT (VISUAL) MODE
# ──────────────────────────────────────────────

[keys.select]
# Vim paragraph motions in visual
"{" = ["extend_to_line_bounds", "goto_prev_paragraph"]
"}" = ["extend_to_line_bounds", "goto_next_paragraph"]
0 = "goto_line_start"
"$" = "goto_line_end"
"^" = "goto_first_nonwhitespace"
G = "goto_file_end"
"%" = "match_brackets"

# Delete/change in visual
D = ["extend_to_line_bounds", "delete_selection", "normal_mode"]
C = ["goto_line_start", "extend_to_line_bounds", "change_selection"]

# Surround in visual
S = "surround_add"

# Case switching
u = ["switch_to_lowercase", "collapse_selection", "normal_mode"]
U = ["switch_to_uppercase", "collapse_selection", "normal_mode"]

# Text object selection in visual
i = "select_textobject_inner"
a = "select_textobject_around"

# Insert/append from visual (multi-cursor workflows)
tab = ["insert_mode", "collapse_selection"]
C-a = ["append_mode", "collapse_selection"]

# Sensible visual line selection
k = ["extend_line_up", "extend_to_line_bounds"]
j = ["extend_line_down", "extend_to_line_bounds"]

# Clipboard-first in visual
d = ["yank_main_selection_to_clipboard", "delete_selection"]
x = ["yank_main_selection_to_clipboard", "delete_selection"]
y = ["yank_main_selection_to_clipboard", "normal_mode", "flip_selections", "collapse_selection"]
Y = ["extend_to_line_bounds", "yank_main_selection_to_clipboard", "goto_line_start", "collapse_selection", "normal_mode"]
p = "replace_selections_with_clipboard"
P = "paste_clipboard_before"

# Clean escape
esc = ["collapse_selection", "keep_primary_selection", "normal_mode"]

# ] and [ in select mode
[keys.select."]"]
"]" = "goto_next_paragraph"
d = "goto_next_diag"
f = "goto_next_function"

[keys.select."["]
"[" = "goto_prev_paragraph"
d = "goto_prev_diag"
f = "goto_prev_function"
